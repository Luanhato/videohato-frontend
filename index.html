<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VideoHato - Xem Phim AI</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-slate-950 text-white m-0 p-0">
    <div id="root"></div>
    
    <script type="text/babel" data-type="module">
      // Tải file App.jsx trực tiếp từ máy chủ
      fetch('/App.jsx')
        .then(response => response.text())
        .then(code => {
          // Biên dịch code JSX sang JS thuần bằng Babel và chạy
          const compiled = Babel.transform(code, { presets: ['react'] }).code;
          const script = document.createElement('script');
          script.text = compiled;
          document.body.appendChild(script);
        })
        .catch(err => console.error("Lỗi tải file giao diện:", err));
    </script>
  </body>
</html>
