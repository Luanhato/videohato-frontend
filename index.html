<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VideoHato - Xem Phim AI</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; }
    </style>
  </head>
  <body class="bg-slate-950 text-white m-0 p-0">
    <div id="root"></div>
    
    <script type="text/babel" data-type="module">
      const { useState } = React;

      function VidToolsClone() {
        const [title, setTitle] = useState('Video Mới');
        const [script, setScript] = useState('bạn hãy tạo một bộ phim pokemon săn quái vật');
        const [scenes, setScenes] = useState([]);
        const [isLoading, setIsLoading] = useState(false);
        const [videoLoading, setVideoLoading] = useState({});
        const [selectedDurations, setSelectedDurations] = useState({});

        // Hàm tạo Storyboard ảnh tĩnh mẫu
        const handleCreateStoryboard = async () => {
          setIsLoading(true);
          setTimeout(() => {
            const mockScenes = [
              { id: 'SCENE_1', title: 'PHÂN CẢNH 1', image: 'https://images.unsplash.com/photo-1511447333015-45b65e60f6d5?w=500', desc: 'Bối cảnh rừng nguyên sinh u ám...', video: null },
              { id: 'SCENE_2', title: 'PHÂN CẢNH 2', image: 'https://images.unsplash.com/photo-1534447677768-be436bb09401?w=500', desc: 'Quái vật khổng lồ xuất hiện...', video: null }
            ];
            setScenes(mockScenes);
            setIsLoading(false);
          }, 1000);
        };

        const handleDurationChange = (sceneId, duration) => {
          setSelectedDurations(prev => ({ ...prev, [sceneId]: duration }));
        };

        // Hàm gọi API Backend Python Render để tạo và nối dài Video
        const handleGenerateVideo = async (sceneId, imageUrl, promptText) => {
          const duration = selectedDurations[sceneId] || 8;
          setVideoLoading(prev => ({ ...prev, [sceneId]: true }));

          try {
            // Lấy link cấu hình từ Vercel Environment Variables qua window hoặc dùng trực tiếp
            const apiUrl = "https://videohato-backend-1.onrender.com";
            const response = await fetch(`${apiUrl}/api/generate-video`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                scene_id: sceneId,
                image_url: imageUrl,
                prompt: promptText,
                duration: Number(duration)
              })
            });

            const data = await response.json();
            if (data.video_url) {
              setScenes(prev => prev.map(scene => 
                scene.id === sceneId ? { ...scene, video: data.video_url } : scene
              ));
            } else {
              alert('Không nhận được link video từ máy chủ AI.');
            }
          } catch (error) {
            console.error(error);
            alert('Lỗi kết nối đến bộ não máy chủ Render.');
          } {
            setVideoLoading(prev => ({ ...prev, [sceneId]: false }));
          }
        };

        return (
          <div class="min-h-screen bg-slate-950 text-slate-100 p-6">
            <header class="max-w-6xl mx-auto mb-8 border-b border-slate-800 pb-4 flex justify-between items-center">
              <div class="flex items-center gap-3">
                <span class="text-2xl">🎬</span>
                <h1 class="text-xl font-bold bg-gradient-to-r flow-root from-indigo-400 to-cyan-400 bg-clip-text text-transparent">VideoHato AI Studio</h1>
              </div>
              <span class="bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 px-3 py-1 rounded-full text-xs font-semibold">Bản Thử Nghiệm</span>
            </header>

            <main class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
              <div class="md:col-span-1 bg-slate-900 border border-slate-800 rounded-xl p-5 h-fit">
                <h2 class="text-lg font-semibold mb-4 flex items-center gap-2 text-indigo-400">📝 Ý tưởng phim</h2>
                <div class="mb-4">
                  <label class="block text-xs text-slate-400 mb-1 font-medium">Tên phim</label>
                  <input type="text" value={title} onChange={(e) => setTitle(e.target.value)} class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500" />
                </div>
                <div class="mb-5">
                  <label class="block text-xs text-slate-400 mb-1 font-medium">Kịch bản chi tiết</label>
                  <textarea rows="5" value={script} onChange={(e) => setScript(e.target.value)} class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500 resize-none"></textarea>
                </div>
                <button onClick={handleCreateStoryboard} disabled={isLoading} class="w-full bg-indigo-600 hover:bg-indigo-500 disabled:bg-slate-800 disabled:text-slate-500 text-white font-medium py-2.5 rounded-lg text-sm transition-all shadow-lg shadow-indigo-600/10 flex justify-center items-center gap-2">
                  {isLoading ? '⏳ Đang phân tích...' : '✨ Tạo Phân Cảnh (Storyboard)'}
                </button>
              </div>

              <div class="md:col-span-2 space-y-4">
                <div class="flex justify-between items-center mb-2">
                  <h2 class="text-lg font-semibold flex items-center gap-2 text-cyan-400">🎞️ Danh sách phân cảnh</h2>
                  <span class="text-xs text-slate-400">{scenes.length} phân cảnh được tạo</span>
                </div>

                {scenes.length === 0 ? (
                  <div class="border border-dashed border-slate-800 rounded-xl p-12 text-center text-slate-500 bg-slate-900/20">
                    <span class="text-4xl block mb-3">🎨</span>
                    <p class="text-sm">Chưa có phân cảnh nào. Hãy điền kịch bản ở bên trái và bấm nút tạo nhé!</p>
                  </div>
                ) : (
                  scenes.map((scene) => (
                    <div key={scene.id} class="bg-slate-900 border border-slate-800 rounded-xl p-4 grid grid-cols-1 sm:grid-cols-12 gap-4">
                      <div class="sm:col-span-4 relative rounded-lg overflow-hidden border border-slate-800 aspect-video sm:aspect-square bg-slate-950">
                        <img src={scene.image} alt={scene.title} class="w-full h-full object-cover" />
                        <span class="absolute top-2 left-2 bg-slate-950/80 backdrop-blur text-xs px-2 py-0.5 rounded font-bold border border-slate-800">{scene.title}</span>
                      </div>
                      
                      <div class="sm:col-span-8 flex flex-col justify-between">
                        <div>
                          <p class="text-sm text-slate-300 font-medium leading-relaxed bg-slate-950 p-3 rounded-lg border border-slate-800/60 mb-3">{scene.desc}</p>
                          <div class="flex items-center gap-4 mb-4">
                            <label class="text-xs text-slate-400 font-medium">Thời lượng:</label>
                            <div class="flex gap-2">
                              {[8, 15, 30].map((t) => (
                                <button key={t} onClick={() => handleDurationChange(scene.id, t)} class={`text-xs px-2.5 py-1 rounded border transition-all ${ (selectedDurations[scene.id] || 8) === t ? 'bg-cyan-500/10 text-cyan-400 border-cyan-500/40 font-bold' : 'bg-slate-950 text-slate-400 border-slate-800 hover:border-slate-700' }`}>
                                  {t} giây
                                </button>
                              ))}
                            </div>
                          </div>
                        </div>

                        <div class="pt-2 border-t border-slate-800/60 flex flex-col sm:flex-row gap-3 items-stretch sm:items-center justify-between">
                          <button onClick={() => handleGenerateVideo(scene.id, scene.image, scene.desc)} disabled={videoLoading[scene.id]} class="bg-slate-950 hover:bg-slate-800 border border-slate-700 text-slate-200 text-xs font-semibold py-2 px-4 rounded-lg transition-all flex items-center justify-center gap-1.5 disabled:opacity-50">
                            {videoLoading[scene.id] ? '⏳ Đang dựng phim...' : '🎬 Tạo Video bằng AI'}
                          </button>
                          
                          {scene.video && (
                            <a href={scene.video} target="_blank" rel="noreferrer" class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-semibold py-2 px-4 rounded-lg transition-all text-center flex items-center justify-center gap-1">
                              📥 Tải Video Thành Phẩm
                            </a>
                          )}
                        </div>
                      </div>
                    </div>
                  ))
                )}
              </div>
            </main>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<VidToolsClone />);
    </script>
  </body>
</html>
