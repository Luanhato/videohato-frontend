<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VideoHato - Xem Phim AI</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; }
    </style>
  </head>
  <body class="bg-slate-950 text-white m-0 p-0">
    <div id="root"></div>
    
    <script type="text/babel" data-type="module">
      const { useState } = React;

      function VidToolsClone() {
        const [title, setTitle] = useState('Video Mới');
        const [script, setScript] = useState('bạn hãy tạo một bộ phim pokemon săn quái vật');
        const [scenes, setScenes] = useState([]);
        const [isLoading, setIsLoading] = useState(false);
        const [videoLoading, setVideoLoading] = useState({});
        const [selectedDurations, setSelectedDurations] = useState({});

        // Hàm tạo Storyboard ảnh tĩnh mẫu
        const handleCreateStoryboard = async () => {
          if (!script) return alert("Bạn hãy nhập kịch bản đã nhé!");
          setIsLoading(true);
          try {
            const apiUrl = "https://videohato-backend-2.onrender.com"; // Đảm bảo đúng số 2
            const response = await fetch(`${apiUrl}/api/create-storyboard`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ script: script })
            });
            const data = await response.json();
            if (data.scenes) {
              setScenes(data.scenes);
            } else {
              alert("AI bận quá, chưa vẽ được phân cảnh rồi!");
            }
          } catch (error) {
            console.error(error);
            alert("Lỗi kết nối khi gọi AI vẽ ảnh.");
          } finally {
            setIsLoading(false);
          }
        };
